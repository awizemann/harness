name: Harness
options:
  bundleIdPrefix: com.harness
  deploymentTarget:
    macOS: "14.0"
  developmentLanguage: en
  createIntermediateGroups: true
  generateEmptyDirectories: true
  groupSortPosition: top
  fileTypes:
    md:
      buildPhase: none
  # Seed the generated stubs before xcodegen scans `sources:`. The actual
  # values are overwritten on every build by the matching pre-build scripts
  # (`Generate HarnessGeneratedRepoRoot.swift`, `Generate
  # HarnessGeneratedWDASnapshot.swift`) — this just guarantees the files
  # exist so the source list picks them up.
  preGenCommand: |
    mkdir -p Harness/Generated
    if [ ! -f Harness/Generated/HarnessGeneratedRepoRoot.swift ]; then
      printf '%s\n' \
        '// AUTO-GENERATED at build time. Do not edit — see project.yml.' \
        'enum HarnessGeneratedRepoRoot {' \
        '    static let path = ""' \
        '}' \
        > Harness/Generated/HarnessGeneratedRepoRoot.swift
    fi
    if [ ! -f Harness/Generated/HarnessGeneratedWDASnapshot.swift ]; then
      printf '%s\n' \
        '// AUTO-GENERATED at build time. Do not edit — see project.yml.' \
        'enum HarnessGeneratedWDASnapshot {' \
        '    static let sha = ""' \
        '}' \
        > Harness/Generated/HarnessGeneratedWDASnapshot.swift
    fi
settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    SWIFT_UPCOMING_FEATURE_EXISTENTIAL_ANY: YES
    DEAD_CODE_STRIPPING: YES
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    PRODUCT_BUNDLE_IDENTIFIER: com.harness.app
    INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.developer-tools
    INFOPLIST_KEY_NSHumanReadableCopyright: ""
    GENERATE_INFOPLIST_FILE: YES
    CODE_SIGN_STYLE: Automatic
    # Apple Developer Team ID. Required for the keychain-access-groups
    # entitlement. Set to your team ID or override locally — `xcodegen
    # generate` regenerates the .pbxproj from this file, so a value set
    # via Xcode → Signing & Capabilities will be wiped on regen.
    DEVELOPMENT_TEAM: 3Q6X2L86C4
targets:
  Harness:
    type: application
    platform: macOS
    sources:
      - path: Harness
      - path: HarnessDesign
        excludes:
          # Designer mocks that re-implement production screens against
          # mock data. They share filenames with `Harness/Features/*/Views/`
          # and pull in symbols (HColor, RunMode redeclarations) that
          # collide with production. Kept in-tree as visual references
          # only — never compiled into the app target.
          - "Screens/**"
      - path: docs/PROMPTS
        type: folder
        buildPhase: resources
      # WebDriverAgent submodule — bundled verbatim into the .app's
      # Resources/ so first-run WDA builds work for users who installed
      # from a release zip (where the SRCROOT path baked into
      # `HarnessGeneratedRepoRoot.swift` doesn't exist on disk).
      # Resolution order in `HarnessPaths.wdaSourceURL`: bundle first,
      # then SRCROOT for dev-mode runs from Xcode.
      - path: vendor/WebDriverAgent
        type: folder
        buildPhase: resources
    settings:
      base:
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_ENTITLEMENTS: Harness/Resources/Harness.entitlements
        INFOPLIST_KEY_NSMainStoryboardFile: ""
        INFOPLIST_KEY_NSPrincipalClass: NSApplication
        INFOPLIST_KEY_LSMinimumSystemVersion: "14.0"
        INFOPLIST_KEY_CFBundleName: Harness
        INFOPLIST_KEY_CFBundleDisplayName: Harness
        MARKETING_VERSION: "0.3.1"
        CURRENT_PROJECT_VERSION: "4"
    preBuildScripts:
      # Bake $SRCROOT into the generated Swift stub so the running app can find
      # `vendor/WebDriverAgent` for first-run WDA builds. Read at runtime via
      # `HarnessPaths.repoRoot`. The stub itself is gitignored under
      # `Harness/Generated/` and seeded by xcodegen's preGenCommand; this
      # script keeps its content current.
      - name: Generate HarnessGeneratedRepoRoot.swift
        basedOnDependencyAnalysis: false
        script: |
          set -e
          DEST="$SRCROOT/Harness/Generated/HarnessGeneratedRepoRoot.swift"
          mkdir -p "$(dirname "$DEST")"
          NEW=$(printf '%s\n' \
            '// AUTO-GENERATED at build time. Do not edit — see project.yml.' \
            'enum HarnessGeneratedRepoRoot {' \
            "    static let path = \"$SRCROOT\"" \
            '}')
          if [ ! -f "$DEST" ] || [ "$(cat "$DEST")" != "$NEW" ]; then
            printf '%s\n' "$NEW" > "$DEST"
          fi
      # Bake the WebDriverAgent submodule's HEAD SHA into the binary so
      # `WDABuilder` can decide whether its on-disk build cache is still
      # valid in release mode — where the bundled `Resources/WebDriverAgent`
      # has no usable `.git` and `git rev-parse HEAD` against it fails.
      # In dev mode the runtime `git rev-parse` against the SRCROOT submodule
      # still wins, so the cache invalidates on every `git pull` of the submodule.
      - name: Generate HarnessGeneratedWDASnapshot.swift
        basedOnDependencyAnalysis: false
        script: |
          set -e
          DEST="$SRCROOT/Harness/Generated/HarnessGeneratedWDASnapshot.swift"
          mkdir -p "$(dirname "$DEST")"
          SHA="$(/usr/bin/git -C "$SRCROOT/vendor/WebDriverAgent" rev-parse HEAD 2>/dev/null || echo "")"
          NEW=$(printf '%s\n' \
            '// AUTO-GENERATED at build time. Do not edit — see project.yml.' \
            'enum HarnessGeneratedWDASnapshot {' \
            "    static let sha = \"$SHA\"" \
            '}')
          if [ ! -f "$DEST" ] || [ "$(cat "$DEST")" != "$NEW" ]; then
            printf '%s\n' "$NEW" > "$DEST"
          fi
  HarnessTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests/HarnessTests
    dependencies:
      - target: Harness
    settings:
      base:
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Harness.app/Contents/MacOS/Harness"
        PRODUCT_BUNDLE_IDENTIFIER: com.harness.tests
        GENERATE_INFOPLIST_FILE: YES
schemes:
  Harness:
    build:
      targets:
        Harness: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - HarnessTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
